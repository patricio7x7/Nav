<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patrick Nav</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0e0e0e;
      --surface: #161616;
      --border: #2a2a2a;
      --accent: #d4f763;
      --text: #f0f0f0;
      --muted: #666;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      padding: 60px 40px;
      max-width: 860px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 64px;
      opacity: 0;
      transform: translateY(12px);
      animation: rise 0.5s ease forwards;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.8rem, 7vw, 5rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
      color: var(--text);
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      margin-top: 10px;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: var(--accent);
      margin: 28px 0;
      opacity: 0;
      animation: rise 0.5s 0.15s ease forwards;
    }

    .section-label {
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
      opacity: 0;
      animation: rise 0.5s 0.25s ease forwards;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      text-decoration: none;
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      transition: border-color 0.18s, background 0.18s, transform 0.18s;
      cursor: pointer;
      opacity: 0;
      animation: rise 0.4s ease forwards;
    }

    .btn:hover {
      border-color: var(--accent);
      background: #1c1c1c;
      transform: translateY(-2px);
    }

    .btn:hover .icon {
      background: var(--accent);
      color: #0e0e0e;
    }

    .icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      flex-shrink: 0;
      transition: background 0.18s, color 0.18s;
    }

    .btn-label {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .btn-name {
      color: var(--text);
    }

    .btn-desc {
      font-size: 0.65rem;
      color: var(--muted);
    }

    @keyframes rise {
      to { opacity: 1; transform: translateY(0); }
    }

    /* stagger grid items */
    .grid .btn:nth-child(1) { animation-delay: 0.3s; }
    .grid .btn:nth-child(2) { animation-delay: 0.36s; }
    .grid .btn:nth-child(3) { animation-delay: 0.42s; }
    .grid .btn:nth-child(4) { animation-delay: 0.48s; }
    .grid .btn:nth-child(5) { animation-delay: 0.54s; }
    .grid .btn:nth-child(6) { animation-delay: 0.60s; }
  </style>
</head>
<body>

  <header>
    <h1>Patrick<span>.</span></h1>
    <p class="subtitle">Personal Nav</p>
  </header>

  <div class="divider"></div>

  <p class="section-label">Projects</p>

  <div class="grid">

    <a href="#" class="btn">
      <div class="icon">📓</div>
      <div class="btn-label">
        <span class="btn-name">Notes</span>
        <span class="btn-desc">Study notes</span>
      </div>
    </a>

    <a href="#" class="btn">
      <div class="icon">⚡</div>
      <div class="btn-label">
        <span class="btn-name">Project 2</span>
        <span class="btn-desc">Description</span>
      </div>
    </a>

    <a href="#" class="btn">
      <div class="icon">🧪</div>
      <div class="btn-label">
        <span class="btn-name">Project 3</span>
        <span class="btn-desc">Description</span>
      </div>
    </a>

    <a href="#" class="btn">
      <div class="icon">🗂️</div>
      <div class="btn-label">
        <span class="btn-name">Project 4</span>
        <span class="btn-desc">Description</span>
      </div>
    </a>

    <a href="#" class="btn">
      <div class="icon">🔭</div>
      <div class="btn-label">
        <span class="btn-name">Project 5</span>
        <span class="btn-desc">Description</span>
      </div>
    </a>

    <a href="#" class="btn">
      <div class="icon">+</div>
      <div class="btn-label">
        <span class="btn-name">Add new</span>
        <span class="btn-desc">Coming soon</span>
      </div>
    </a>

  </div>

</body>
</html>
